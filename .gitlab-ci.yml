.default:
  artifacts:
    when: always
    expire_in: 7 days
    # Never collect virtual environments
    exclude:
      - .venv/**
      - venv/**
      - __pycache__/
      - /builds/*

include:
  - remote: https://jobs.just-ci.dev/v7.0.0/templates/python.yml

variables:
  PYVERSION: 3.12-slim
  PYUPGRADE_TARGET_VERSION: "3.12"
  PYTHON_EXCLUDE_PATHS: tests,setup.py,migrations,.venv,venv,build,builds
  PYTHON_EXCLUDE_REGEX: (^|/)(\.venv|venv|build|builds)(/|$)|(tests|setup\.py|migrations)
  GITLAB_RECOMMENDED_AUTO_FIX: "true"

python:lizard:
  extends: .python:pre
  variables:
    JOB_PACKAGE: lizard
  script:
    - pip3 --version
    - python3 -m pip --version
    - python3 -m pip install --break-system-packages -qqq --progress-bar=off --log=${CI_PROJECT_DIR}/pip-log.txt lizard
    - python3 -m lizard ${LIZARD_DEFAULT_ARGS} ${LIZARD_EXTRA_ARGS}

python:build:
  extends: .python:pre
  stage: build
  variables:
    JOB_PACKAGE: build
  script:
    - pip3 --version
    - python3 -m pip --version
    - python3 -m pip install --break-system-packages -qqq --progress-bar=off --log=${CI_PROJECT_DIR}/pip-log.txt build
    - cd ${PYTHON_CONTEXT:=.}
    - python3 -m build --version
    - python3 -m build . --outdir ${CI_PROJECT_DIR}/dist
  artifacts:
    paths:
      - dist
  needs: []

python:package-discovery:
  extends: .python:pre
  stage: build
  script:
    - cd ${PYTHON_CONTEXT:-.}
    - |
      printf "PYTHON_PACKAGE=" > ${CI_PROJECT_DIR}/package.env
      printf "[*] Auto discovered package: "
      pip3 install --break-system-packages . --no-deps | grep 'Installing collected packages: ' | cut -d' ' -f4 | tr - _ | tee -a ${CI_PROJECT_DIR}/package.env
      echo "[*] If this is not correct, provide the package name variable PYTHON_PACKAGE=<package_name> in your .gitlab-ci.yml"
  artifacts:
    reports:
      dotenv: package.env
  rules:
    - if: "$PYTHON_PACKAGE == null"

python:mypy:
  stage: test
  script:
    - cd ${PYTHON_CONTEXT:=.}
    - python3 -m venv .venv-ci
    - source .venv-ci/bin/activate
    - python -m pip install -q -U pip setuptools wheel
    - python -m pip install -q mypy
    - python -m pip install -q .
    - mkdir -p .mypy_cache
    - mypy --version
    - mypy --install-types --non-interactive --junit-xml ${CI_PROJECT_DIR}/mypy-report.xml ${MYPY_DEFAULT_ARGS:---strict --ignore-missing-imports --show-error-context} ${MYPY_EXTRA_ARGS} ${MYPY_TARGET:-.} --exclude "${PYTHON_EXCLUDE_REGEX:-(?!)}"
  artifacts:
    reports:
      junit: mypy-report.xml

python:pylint:
  stage: test
  script:
    - cd ${PYTHON_CONTEXT:=.}
    - python3 -m venv .venv-ci
    - source .venv-ci/bin/activate
    - python -m pip install -q -U pip setuptools wheel
    - python -m pip install -q pylint pylint-junit pylint-gitlab
    - python -m pip install -q .
    - |
      if [ "${PYLINT_EXTRA_OUTPUT_FORMATS}" != "" ]; then
        echo "[*] Extra output formats: ${PYLINT_EXTRA_OUTPUT_FORMATS}"
        if [ "${PYLINT_EXTRA_OUTPUT_FORMATS:0:1}" != "," ]; then
          PYLINT_EXTRA_OUTPUT_FORMATS=",${PYLINT_EXTRA_OUTPUT_FORMATS}"
        fi
      fi
    - pylint --version
    - pylint --fail-under=${PYLINT_THRESHOLD:-6} --output-format=pylint_junit.JUnitReporter:${CI_PROJECT_DIR}/pylint-report.xml,pylint_gitlab.GitlabCodeClimateReporter:${CI_PROJECT_DIR}/code-climate.json,colorized${PYLINT_EXTRA_OUTPUT_FORMATS} --ignore-paths=${PYTHON_EXCLUDE_PATHS} ${PYLINT_DEFAULT_ARGS:---recursive=y} ${PYLINT_EXTRA_ARGS} ${PYLINT_TARGET:-.}
  artifacts:
    reports:
      junit: pylint-report.xml
      codequality: code-climate.json

python:pytest:
  stage: test
  script:
    - cd ${PYTHON_CONTEXT:=.}
    - python3 -m venv .venv-ci
    - source .venv-ci/bin/activate
    - python -m pip install -q -U pip setuptools wheel
    - python -m pip install -q pytest pytest-cov ${PYTEST_INSTALL_PLUGINS}
    - python -m pip install -q .
    - ${PYTEST_INVOCATION:-python3 -m pytest} --version
    - ${PYTEST_INVOCATION:-python3 -m pytest} --cov=${PYTEST_COVERAGE_PATH:-${PYTHON_PACKAGE:-.}} --cov-fail-under=${PYTEST_COVERAGE_THRESHOLD:-25} --junitxml=${CI_PROJECT_DIR}/pytest-report.xml --cov-report xml:${CI_PROJECT_DIR}/pytest-coverage.xml -p no:cacheprovider ${PYTEST_DEFAULT_ARGS:--vvv --capture=tee-sys -o log_cli=true -o log_cli_level=DEBUG --color=yes} ${PYTEST_EXTRA_ARGS} ${PYTEST_TARGET:-.}
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      junit: pytest-report.xml
      coverage_report:
        coverage_format: cobertura
        path: pytest-coverage.xml

python:bandit:
  stage: test
  script:
    - cd ${PYTHON_CONTEXT:=.}
    - python3 -m venv .venv-ci
    - source .venv-ci/bin/activate
    - python -m pip install -q -U pip setuptools wheel
    - python -m pip install -q bandit
    - |
      if [ "${PYTHON_EXCLUDE_PATHS}" != "" ]; then
        BANDIT_EXCLUDE_PATHS="./$(echo ${PYTHON_EXCLUDE_PATHS} | sed 's/\,/\,\.\//g')"
      fi
    - python -m bandit --version
    - python -m bandit --verbose --recursive . --exclude "${BANDIT_EXCLUDE_PATHS}" --skip "${BANDIT_SKIP_CHECK}" ${BANDIT_EXTRA_ARGS}
  allow_failure: true

gitlab:recommended:
  stage: test
  image:
    name: ghcr.io/tomwright/dasel:2-alpine
    entrypoint: [""]
  variables:
    GIT_STRATEGY: none
    GIT_CREDENTIALS: "https://oauth2:${GL_TOKEN}@gitlab.com/cossas/provile.git"
    RECOMMENDED_SETTINGS: |
      merge_requests_enabled:
        recommended: true
        hint: Enable merge requests.
      merge_method:
        recommended: merge
        hint:
          To ensure a full history of what happened with your code, never use fast
          forward. Set 'Merge method' to 'Merge commit'
      only_allow_merge_if_pipeline_succeeds:
        recommended: true
        hint:
          Only allow merging when the pipeline succeeds, to ensure no broken code can
          be merged.
      only_allow_merge_if_all_discussions_are_resolved:
        recommended: true
        hint:
          Ensure all discussions are resolved before merging. Tedious perhaps, but
          reduces mistakes.
      allow_merge_on_skipped_pipeline:
        recommended: false
        hint: Do not allow merging on skipped pipelines.
      remove_source_branch_after_merge:
        recommended: true
        hint:
          To keep your repo clean, remove source branches when merge requests are
          merged.
      autoclose_referenced_issues:
        recommended: true
        hint: Set auto close referenced issues.
  script:
    - |
      if command -v curl >/dev/null; then
        echo "[*] curl already available"
      elif command -v apk >/dev/null; then
        apk add -q curl
      elif command -v apt-get >/dev/null; then
        apt-get update -qq && apt-get install -qqy curl
      else
        echo "[!] Unable to install curl (no supported package manager found)."
        exit 1
      fi
    - |
      if command -v dasel >/dev/null; then
        echo "[*] dasel already available"
      elif command -v apk >/dev/null; then
        apk add -q dasel || true
      fi
    - |
      if ! command -v dasel >/dev/null; then
        DASEL_VERSION="2.8.1"
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64) DASEL_ARCH="amd64" ;;
          aarch64|arm64) DASEL_ARCH="arm64" ;;
          *) echo "[!] Unsupported architecture for dasel: ${ARCH}"; exit 1 ;;
        esac
        DASEL_URL="https://github.com/TomWright/dasel/releases/download/v${DASEL_VERSION}/dasel_linux_${DASEL_ARCH}"
        mkdir -p "${CI_PROJECT_DIR}/.local/bin"
        curl -sSLf "${DASEL_URL}" -o "${CI_PROJECT_DIR}/.local/bin/dasel"
        chmod +x "${CI_PROJECT_DIR}/.local/bin/dasel"
        export PATH="${CI_PROJECT_DIR}/.local/bin:${PATH}"
      fi
    - |
      if ! command -v dasel >/dev/null; then
        export PATH="${CI_PROJECT_DIR}/.local/bin:${PATH}"
      fi
    - dasel --version
    - echo "${RECOMMENDED_SETTINGS}" > settings.yaml
    - >
      curl -sSLf -H "PRIVATE-TOKEN: ${GL_TOKEN}"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}" -o project.json
    - let COUNT=0 || true
    - KEYS="$(dasel -f settings.yaml "keys().all()" -w -)"
    - |
      for KEY in ${KEYS}; do
        printf "[*] Checking ${KEY}..."
        CURRENT=$(dasel -f project.json -r json "${KEY}" -w - || echo "error")
        RECOMMENDED=$(dasel -f settings.yaml "${KEY}.recommended")
        HINT=$(dasel -f settings.yaml "${KEY}.hint")
        if [ "${CURRENT}" != "${RECOMMENDED}" ]; then
          echo -e " \e[31mrecommended value not set\e[0m. Current value is: ${CURRENT}. Expected value is: ${RECOMMENDED}."
          echo "${HINT}"
          if [ "${GITLAB_RECOMMENDED_AUTO_FIX}" = "true" ]; then
            printf "[*] Automatically fixing the problem..."
            curl -sSLf -H "PRIVATE-TOKEN: ${GL_TOKEN}" -X PUT "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}" -d "${KEY}=${RECOMMENDED}" > /dev/null
            echo -e " \e[32mdone\e[0m."
          else
            let COUNT++ || true
          fi
        else
          echo -e " \e[32mrecommended value set\e[0m: ${RECOMMENDED}."
        fi
      done
    - |
      if test ${COUNT} -gt 0; then
        echo "[!] There are $COUNT settings to check. See above. To resolve these automatically, add the following variable to your .gitlab-ci.yml:"
        echo -e 'variables:\n  GITLAB_RECOMMENDED_AUTO_FIX: "true"'
        exit 1
      else
        echo "[+] All good!"
      fi
  rules:
    - if: $GL_TOKEN
  needs: []

find-next-release:
  extends: .release:rules
  stage: build
  image: registry.gitlab.com/just-ci/images/node:alpine
  variables:
    NPM_PACKAGES: semantic-release @semantic-release/exec
    GIT_CREDENTIALS: "https://oauth2:${GL_TOKEN}@gitlab.com/cossas/provile.git"
  before_script:
    - npm config set force true
  script:
    - |
      if command -v npm >/dev/null; then
        echo "[*] npm already available"
      else
        NODE_VERSION="v20.17.0"
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64) NODE_ARCH="x64" ;;
          aarch64|arm64) NODE_ARCH="arm64" ;;
          *) echo "[!] Unsupported architecture for Node.js: ${ARCH}"; exit 1 ;;
        esac

        mkdir -p "${CI_PROJECT_DIR}/.local"
        NODE_DIST="node-${NODE_VERSION}-linux-${NODE_ARCH}"
        NODE_TAR="${NODE_DIST}.tar.xz"
        NODE_URL="https://nodejs.org/dist/${NODE_VERSION}/${NODE_TAR}"

        if command -v curl >/dev/null; then
          curl -sSLf "${NODE_URL}" -o "${CI_PROJECT_DIR}/.local/${NODE_TAR}"
        elif command -v wget >/dev/null; then
          wget -qO "${CI_PROJECT_DIR}/.local/${NODE_TAR}" "${NODE_URL}"
        else
          echo "[!] Neither curl nor wget is available to download Node.js."
          exit 1
        fi

        tar -xJf "${CI_PROJECT_DIR}/.local/${NODE_TAR}" -C "${CI_PROJECT_DIR}/.local"
        export PATH="${CI_PROJECT_DIR}/.local/${NODE_DIST}/bin:${PATH}"
      fi
    - |
      if ! command -v npm >/dev/null; then
        echo "[!] npm is still unavailable after bootstrap."
        exit 1
      fi
    - !reference [".release:install", script]
    - wget -O .releaserc https://gitlab.com/just-ci/templates/-/raw/v7.0.0/project-automation/release/find-next-release.json
    - semantic-release --dry-run --no-ci
    - |
      if [ -f .VERSION ]; then
        echo "TBUMP_NEXT_VERSION=$(cat .VERSION)" > TBUMP_NEXT_VERSION.env
      else
        echo "TBUMP_NEXT_VERSION=" > TBUMP_NEXT_VERSION.env
      fi
  artifacts:
    reports:
      dotenv: TBUMP_NEXT_VERSION.env

semantic-release:
  extends: .release:rules
  image: registry.gitlab.com/just-ci/images/node:alpine
  stage: .post
  variables:
    NPM_PACKAGES: semantic-release @semantic-release/gitlab @semantic-release/git @semantic-release/changelog @semantic-release/exec
  script:
    - |
      if command -v npm >/dev/null; then
        echo "[*] npm already available"
      else
        NODE_VERSION="v20.17.0"
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64) NODE_ARCH="x64" ;;
          aarch64|arm64) NODE_ARCH="arm64" ;;
          *) echo "[!] Unsupported architecture for Node.js: ${ARCH}"; exit 1 ;;
        esac
        mkdir -p "${CI_PROJECT_DIR}/.local"
        NODE_DIST="node-${NODE_VERSION}-linux-${NODE_ARCH}"
        NODE_TAR="${NODE_DIST}.tar.xz"
        NODE_URL="https://nodejs.org/dist/${NODE_VERSION}/${NODE_TAR}"
        if command -v curl >/dev/null; then
          curl -sSLf "${NODE_URL}" -o "${CI_PROJECT_DIR}/.local/${NODE_TAR}"
        elif command -v wget >/dev/null; then
          wget -qO "${CI_PROJECT_DIR}/.local/${NODE_TAR}" "${NODE_URL}"
        else
          echo "[!] Neither curl nor wget is available to download Node.js."
          exit 1
        fi
        tar -xJf "${CI_PROJECT_DIR}/.local/${NODE_TAR}" -C "${CI_PROJECT_DIR}/.local"
        export PATH="${CI_PROJECT_DIR}/.local/${NODE_DIST}/bin:${PATH}"
      fi
    - |
      if ! command -v npm >/dev/null; then
        echo "[!] npm is still unavailable after bootstrap."
        exit 1
      fi
    - !reference [".release:install", script]
    - |
      if command -v dasel >/dev/null; then
        echo "[*] dasel already available"
      else
        DASEL_VERSION="2.8.1"
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64) DASEL_ARCH="amd64" ;;
          aarch64|arm64) DASEL_ARCH="arm64" ;;
          *) echo "[!] Unsupported architecture for dasel: ${ARCH}"; exit 1 ;;
        esac
        mkdir -p "${CI_PROJECT_DIR}/.local/bin"
        DASEL_URL="https://github.com/TomWright/dasel/releases/download/v${DASEL_VERSION}/dasel_linux_${DASEL_ARCH}"
        if command -v curl >/dev/null; then
          curl -sSLf "${DASEL_URL}" -o "${CI_PROJECT_DIR}/.local/bin/dasel"
        elif command -v wget >/dev/null; then
          wget -qO "${CI_PROJECT_DIR}/.local/bin/dasel" "${DASEL_URL}"
        else
          echo "[!] Neither curl nor wget is available to download dasel."
          exit 1
        fi
        chmod +x "${CI_PROJECT_DIR}/.local/bin/dasel"
        export PATH="${CI_PROJECT_DIR}/.local/bin:${PATH}"
      fi
    - dasel --version
    - |
      if ! test -f .releaserc; then
        echo "[+] Using default .releaserc."
        if command -v curl >/dev/null; then
          curl -sSLf "${DEFAULT_RELEASERC:-https://gitlab.com/just-ci/templates/-/raw/v7.0.0/project-automation/release/releaserc-default.json}" -o .releaserc
        else
          wget -qO .releaserc "${DEFAULT_RELEASERC:-https://gitlab.com/just-ci/templates/-/raw/v7.0.0/project-automation/release/releaserc-default.json}"
        fi
      fi
    - |
      if [ "$(dasel -f .releaserc -r json 'plugins.all().filter(equal(type(),array)).all().filter(equal(type(),object)).assets.all().count()')" = "0" ] && [ "${DISABLE_AUTO_RELEASE_ASSETS}" = "" ]; then
        echo "[-] No assets set in .releaserc."
        if test -f tbump.toml; then
          SOURCE_FILE=tbump.toml
          DASEL_PATH=.file
        elif test -f pyproject.toml; then
          SOURCE_FILE=pyproject.toml
          DASEL_PATH=.tool.tbump.file
        else
          echo "[-] No tbump.toml or pyproject.toml to retrieve assets. Not pushing assets."
        fi
      fi
    - |
      if [ "${SOURCE_FILE}" != "" ]; then
        TBUMP_FILES=$(dasel -f ${SOURCE_FILE} -r toml -w yaml "${DASEL_PATH}.all().src")
        if [ "${TBUMP_FILES}" = "null" ]; then
          echo "[-] No files set. Not pushing assets."
        else
          if [ "${RELEASE_CHANGELOG:-true}" = "true" ]; then
            TBUMP_FILES="${TBUMP_FILES} CHANGELOG.md"
          fi
          for FILE in ${TBUMP_FILES} ${SOURCE_FILE}; do
            if [ $(dasel -f .releaserc -r json "plugins.all().filter(equal(type(),array)).all().filter(equal(type(),object)).assets.all().filter(equal(.,${FILE})).count(),0.moreThan(.,0)") = "false" ]; then
              dasel put -f .releaserc -t string -r json -w json -v "${FILE}" 'plugins.all().filter(equal(type(),array)).all().filter(equal(type(),object)).assets.append()'
              echo "[+] Added ${FILE} to .releaserc."
            fi
          done
        fi
      fi
    - |
      if [ "${GITLAB_USER_EMAIL}" != "" ]; then
        export GIT_AUTHOR_EMAIL="${GITLAB_USER_EMAIL}"
      elif [ "${GIT_AUTHOR_EMAIL}" = "" ]; then
        export GIT_AUTHOR_EMAIL="ci@example.invalid"
      fi
      export GIT_COMMITTER_EMAIL="${GIT_AUTHOR_EMAIL}"
    - semantic-release ${SEMANTIC_RELEASE_EXTRA_ARGS}
  dependencies:
    - tbump
  artifacts:
    paths:
      - .releaserc
    when: always

